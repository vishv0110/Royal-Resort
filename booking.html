<!DOCTYPE html>
<html>
<head>
<title>Royal Resort Booking</title>

<style>

body{
    font-family: Arial;
    background-color:#f2f2f2;
    text-align:center;
    margin:0;
}

/* Banner */

.banner{
    width:100%;
    height:300px;
    object-fit:cover;
}

/* Navigation */

nav{
    background-color:black;
    padding:12px;
}

nav a{
    color:white;
    margin:20px;
    text-decoration:none;
    font-size:18px;
}

nav a:hover{
    color:yellow;
}

/* Form Box */

.form-box{
    background:white;
    width:400px;
    margin:40px auto;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    text-align:left;
}

/* Inputs */

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
}

/* Button */

button{
    width:100%;
    padding:10px;
    background:black;
    color:white;
    border:none;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background-color:green;
}

</style>

</head>

<body>

<img src="resort_banner.jpg" class="banner">

<nav>
<a href="index.html">Home</a>
<a href="rooms.html">Rooms</a>
<a href="booking.html">Booking</a>
</nav>

<h1>Room Booking</h1>

<div class="form-box">

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Phone Number</label>
<input type="text" placeholder="Enter phone number">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Select Room</label>
<select>
<option>Standard Room - ₹2000</option>
<option>Deluxe Room - ₹3500</option>
<option>VIP Room - ₹5500</option>
<option>Super Deluxe Room - ₹8000</option>
</select>

<label>Check-in Date</label>
<input type="date">

<label>Check-out Date</label>
<input type="date">

<label>Number of Guests</label>
<input type="number" min="1" max="10">

<label>Payment Method</label>
<select>
<option>Cash</option>
<option>Credit Card</option>
<option>UPI</option>
<option>Debit Card</option>
</select>

<button type="submit">Book Room</button>

</form>

</div>

</body>
</html>
